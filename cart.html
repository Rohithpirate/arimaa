<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart & Order | ARIMAA PRODUCTS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand-wrap">
      <img src="assets/ap-logo.jpg" alt="AP logo - Arimaa Products" class="brand-logo" />
      <div>
        <h1>ARIMAA PRODUCTS</h1>
        <p>Checkout</p>
      </div>
    </div>
    <a class="cart-btn" href="index.html">Back to Shop</a>
  </header>

  <main class="checkout-layout">
    <section class="cart-panel">
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <div class="total-line">Total: <strong id="cart-total">Rs. 0</strong></div>
    </section>

    <section class="form-panel">
      <h2>Order Form</h2>
      <form id="order-form">
        <label>Full Name
          <input type="text" name="name" required />
        </label>
        <label>Phone Number
          <input type="tel" name="phone" required />
        </label>
        <label>Address
          <textarea name="address" id="deliveryAddress" rows="3" required></textarea>
        </label>

        <fieldset>
          <legend>Payment Option</legend>
          <label class="inline"><input type="radio" name="payment" value="upi" checked /> UPI</label>
          <label class="inline"><input type="radio" name="payment" value="cod" /> Cash on Delivery</label>
        </fieldset>

        <div class="upi-box" id="upiBox">
          <p><strong>UPI ID:</strong> Rohithpirate@iob</p>
          <a id="upiPayLink" class="cta" href="#" target="_self">Pay with UPI App</a>
          <button type="button" id="confirmPaymentBtn" class="cta confirm-btn">I Have Paid</button>
          <p class="upi-note">Tap this to open PhonePe / GPay / Paytm with amount auto-filled.</p>
          <div id="paymentSuccess" class="payment-success" aria-live="polite">
            <span class="checkmark"></span>
            <strong>Payment Confirmed</strong>
          </div>
        </div>

        <button type="submit" class="cta">Place Order</button>
      </form>
      <p id="order-msg" class="order-msg"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
